      border: none;
      border-radius: 0;
      background: var(--soft);

    function highlightSelfName(text) {
      return text
        .replaceAll("Yuqing Li", "<span class='author-self'>Yuqing Li</span>")
        .replaceAll("李雨晴", "<span class='author-self'>李雨晴</span>");
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createNav() {
      const nav = document.getElementById("nav");
      const brand = "<a href='#home' class='nav-brand'>Homepage</a>";
      const items = siteData.nav[currentLang].map((item) => `<a href="#${item.id}">${item.label}</a>`).join("");
      nav.innerHTML = brand + items;
    }

    function renderContactIcon(item) {
      if (item.icon === "custom-huggingface") {
        return `<span class="contact-icon hf-icon">${huggingFaceIcon}</span>`;
      }

      return `<span class="contact-icon"><i class="${item.icon}"></i></span>`;
    }

    function renderProfile() {
      const profile = siteData.profile[currentLang];
      document.getElementById("profileName").textContent = profile.name;
      document.getElementById("profileOrg").textContent = profile.org;
      document.getElementById("profileBio").textContent = profile.bio;
      document.getElementById("profileTags").innerHTML = profile.tags
        .map((tag) => `<span class="profile-tag">${tag}</span>`)
        .join("");

      const links = [
        `<span class="location-item"><span class="contact-icon"><i class="fas fa-location-dot"></i></span><span>${profile.location}</span></span>`
      ].concat(
        siteData.contacts[currentLang].map(
          (item) => `<a href="${item.href}" target="_blank" rel="noreferrer">${renderContactIcon(item)}<span>${item.label}</span></a>`
        )
      );

      document.getElementById("sidebarLinks").innerHTML = links.join("");
    }

    function renderHome() {
      const text = siteData.text[currentLang];
      document.getElementById("homeLead").innerHTML = text.homeLead.map((item) => `<p>${item}</p>`).join("");
      document.getElementById("researchTitle").textContent = text.researchTitle;
      document.getElementById("experienceTitle").textContent = text.experienceTitle;
      document.getElementById("researchList").innerHTML = siteData.research[currentLang].map((item) => `<li>${item}</li>`).join("");
      document.getElementById("experienceList").innerHTML = siteData.experience[currentLang].map((item) => `<li>${item}</li>`).join("");
    }

    function renderStaticText() {
      const text = siteData.text[currentLang];
      document.getElementById("newsTitle").textContent = text.newsTitle;
      document.getElementById("publicationsTitle").textContent = text.publicationsTitle;
      document.getElementById("featuredPublishedTitle").textContent = text.featuredPublishedTitle;
      document.getElementById("featuredPreprintTitle").textContent = text.featuredPreprintTitle;
      document.getElementById("awardsTitle").textContent = text.awardsTitle;
      document.getElementById("footerText").textContent = text.footerText;
      document.title = currentLang === "zh" ? "李雨晴 | Academic Homepage" : "Yuqing Li | Academic Homepage";
    }

    function renderNews() {
      document.getElementById("newsList").innerHTML = siteData.news.map((item) => `<li>${item[currentLang]}</li>`).join("");
    }

    function renderAwards() {
      document.getElementById("awardList").innerHTML = siteData.awards.map((item) => `<li>${item[currentLang]}</li>`).join("");
    }

    function toggleBibtex(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.toggle("show-bibtex");
      }
    }

    function buildPaperFigure(paper) {
      if (!paper.image) {
        return "";
      }

      return `
        <div class="paper-figure">
          <span class="paper-badge">${paper.badge[currentLang]}</span>
          <img class="paper-thumb" src="${paper.image}" alt="${paper.title.en || paper.title[currentLang]}" onerror="this.parentElement.classList.add('thumb-failed');">
          <div class="paper-fallback">
            <small>${paper.coverLabel[currentLang]}</small>
            <strong>${paper.shortTitle}</strong>
            <span>${paper.coverNote[currentLang]}</span>
          </div>
        </div>
      `;
    }

    function renderFeatured(containerId, papers) {
      const container = document.getElementById(containerId);
      container.innerHTML = papers.map((paper, idx) => {
        const id = `${containerId}-${idx}`;
        const links = [];
        const textOnlyClass = paper.image ? "" : " text-only";

        if (paper.paperUrl && paper.paperUrl !== "#") {
          links.push(`<a href="${paper.paperUrl}" target="_blank" rel="noreferrer">paper</a>`);
        }

        if (paper.codeUrl && paper.codeUrl !== "#") {
          links.push(`<a href="${paper.codeUrl}" target="_blank" rel="noreferrer">code</a>`);
        }

        if (Array.isArray(paper.resourceLinks)) {
          paper.resourceLinks.forEach((item) => {
            if (item && item.url) {
              links.push(`<a href="${item.url}" target="_blank" rel="noreferrer">${item.label}</a>`);
            }
          });
        }

        if (paper.bibtex) {
          links.push(`<button class="link-btn" type="button" onclick="toggleBibtex('${id}')">bibtex</button>`);
        }

        return `
          <article class="paper-card${textOnlyClass}" id="${id}">
            ${buildPaperFigure(paper)}
            <div>
              ${paper.image ? "" : `<span class="paper-inline-badge">${paper.badge[currentLang]}</span>`}
              <h4 class="paper-title">${paper.title[currentLang]}</h4>
              <div class="paper-authors">${highlightSelfName(paper.authors[currentLang])}</div>
              <div class="paper-desc">${paper.summary[currentLang]}</div>
              <div class="paper-links">${links.join("<span class='sep'>|</span>")}</div>
              ${paper.bibtex ? `<div class="bibtex">${escapeHtml(paper.bibtex)}</div>` : ""}
            </div>
          </article>
        `;
      }).join("");
    }

    function setupSectionObserver() {
      if (sectionObserver) {
        sectionObserver.disconnect();
      }

      const sections = document.querySelectorAll(".content section");
      const navLinks = document.querySelectorAll(".nav a:not(.nav-brand)");

      sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          }
          const id = entry.target.id;
          navLinks.forEach((link) => {
            link.classList.toggle("active", link.getAttribute("href") === `#${id}`);
          });
        });
      }, { threshold: 0.28 });

      sections.forEach((section) => sectionObserver.observe(section));
    }

    function renderAll() {
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
      document.getElementById("langToggle").textContent = currentLang === "zh" ? "English" : "中文";
      createNav();
      renderProfile();
      renderHome();
      renderStaticText();
      renderNews();
      renderFeatured("featuredPreprint", siteData.featuredPreprint);
      renderFeatured("featuredPublished", siteData.featuredPublished);
      renderAwards();
      setupSectionObserver();
    }

    document.getElementById("langToggle").addEventListener("click", () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      renderAll();
    });

    renderAll();
  </script>
